<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PETSCIInator</title>
<style>
  :root{
    /* authentic C64 (Pepto) blues, but with white text for contrast */
    --c64-border:#6c5eb5;   /* light blue border */
    --c64-bg:#352a78;       /* slightly deeper blue so white text pops */
    --c64-fg:#ffffff;       /* white text (C64 colour 1) — high contrast */
    --c64-ltblue:#b0a4e8;
    --c64-white:#ffffff;
    --c64-cyan:#84e7d8;     /* brighter cyan accent */
    --c64-yellow:#ffe866;   /* bright yellow accent */
    --line:#7d6fc8;
  }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%}
  body{
    background:var(--c64-border);
    color:var(--c64-fg);
    font-family:"Courier New",ui-monospace,monospace;
    -webkit-font-smoothing:none;
    text-rendering:geometricPrecision;
    display:flex;flex-direction:column;align-items:center;
    padding:20px 14px 60px;gap:0;
  }
  /* the whole app sits inside a "screen" with the border around it */
  .screen{
    width:min(1000px,100%);
    background:var(--c64-bg);
    color:var(--c64-fg);
    border:0;
    padding:22px 22px 26px;
    box-shadow:0 0 0 14px var(--c64-border), 0 24px 60px #0007;
    position:relative;
    /* faint scanlines */
    background-image:repeating-linear-gradient(180deg,#0000 0 2px,#00000014 2px 3px);
  }
  /* PETSCII title banner drawn from real ROM glyphs */
  #titlebanner{image-rendering:pixelated;display:block;margin:0 auto 4px;max-width:100%;height:auto}
  .sub{color:var(--c64-cyan);letter-spacing:.28em;font-size:12px;text-align:center;margin:2px 0 14px}
  .blink{animation:blink 1.06s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}
  .readyline{color:var(--c64-fg);font-size:13px;letter-spacing:.06em;text-align:center;margin-bottom:18px}

  .bar{
    display:flex;flex-wrap:wrap;gap:12px 20px;align-items:center;
    border-top:2px solid var(--line);border-bottom:2px solid var(--line);
    padding:14px 2px;margin-bottom:16px;
  }
  label{display:flex;flex-direction:column;gap:5px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#d8d0ff}
  .srcfield{display:flex;flex-direction:column;gap:5px}
  .srclabel{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#d8d0ff}
  input[type=range]{width:130px;accent-color:var(--c64-yellow)}
  input[type=checkbox]{accent-color:var(--c64-yellow)}
  select,button,.filebtn{
    font-family:inherit;font-size:12px;letter-spacing:.08em;
    background:var(--c64-bg);color:var(--c64-fg);
    border:2px solid var(--c64-fg);padding:6px 10px;border-radius:0;cursor:pointer;
    text-transform:uppercase;
  }
  button:hover,.filebtn:hover,select:hover{background:var(--c64-fg);color:var(--c64-bg)}
  button:disabled{opacity:.4;cursor:not-allowed}
  button:disabled:hover{background:var(--c64-bg);color:var(--c64-fg)}
  input[type=file]{display:none}
  .val{color:var(--c64-yellow)}
  .stage{display:grid;grid-template-columns:1fr;gap:14px;place-items:center}
  .frame{background:transparent;border:0;padding:0}
  canvas{
    image-rendering:pixelated;max-width:100%;height:auto;
    background:#000;border:2px solid var(--c64-fg);
  }
  .drop{
    border:2px dashed var(--c64-fg);
    width:100%;min-height:220px;display:flex;align-items:center;justify-content:center;
    color:var(--c64-fg);text-align:center;font-size:13px;letter-spacing:.1em;padding:24px;text-transform:uppercase;
  }
  .drop.over{border-color:var(--c64-white);color:var(--c64-white);background:#ffffff10}
  .row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
  .hint{font-size:11px;color:var(--c64-ltblue);letter-spacing:.06em;text-transform:uppercase}
  .swatches{display:flex;gap:2px;margin-top:4px}
  .sw{width:12px;height:12px;border:1px solid #0006}
  a{color:var(--c64-cyan)}
  #status{text-transform:uppercase}
  .busy{
    position:absolute;inset:0;display:none;align-items:center;justify-content:center;
    background:rgba(53,42,120,.86);z-index:5;text-align:center;
  }
  .busy.show{display:flex}
  .busybox{
    border:2px solid var(--c64-fg);padding:18px 22px;min-width:240px;
    background:var(--c64-bg);box-shadow:0 12px 30px #0008;
  }
  .busytitle{font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:var(--c64-yellow)}
  .busytext{margin-top:8px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--c64-ltblue)}
  .scanbar{height:8px;border:1px solid var(--c64-fg);margin-top:14px;overflow:hidden}
  .scanbar span{display:block;width:40%;height:100%;background:var(--c64-cyan);animation:scan 1.1s steps(8) infinite}
  @keyframes scan{0%{transform:translateX(-100%)}100%{transform:translateX(260%)}}
</style>
</head>
<body>
  <div class="screen">
  <div class="busy" id="busy" aria-live="polite" aria-busy="true">
    <div class="busybox">
      <div class="busytitle" id="busytitle">CONVERTING</div>
      <div class="busytext" id="busytext">matching PETSCII structure</div>
      <div class="scanbar"><span></span></div>
    </div>
  </div>
  <canvas id="titlebanner" width="100" height="20"></canvas>
  <div class="sub">IMAGE TO COMMODORE 64 PETSCII CONVERTER</div>
  <div class="readyline">READY.<span class="blink">█</span></div>

  <div class="frame">
    <div class="bar">
      <div class="srcfield">
        <span class="srclabel">Source</span>
        <span class="row">
          <span class="filebtn" id="pick">LOAD FILE</span>
          <input type="file" id="file" accept="image/png,image/jpeg,image/webp,image/gif,image/bmp,image/svg+xml,.svg">
        </span>
      </div>
      <label>Columns <span class="val" id="colsv">40</span>
        <input type="range" id="cols" min="16" max="500" value="40" step="1">
      </label>
      <label>Brightness <span class="val" id="brv">0</span>
        <input type="range" id="bright" min="-80" max="80" value="0" step="1">
      </label>
      <label>Contrast <span class="val" id="conv">1.0</span>
        <input type="range" id="contrast" min="50" max="200" value="100" step="1">
      </label>
      <label>Mode
        <select id="mode">
          <option value="petscii">PETSCII glyphs</option>
          <option value="blocks">Block mosaic (2×2)</option>
        </select>
      </label>
      <label>Algorithm
        <select id="algo">
          <option value="auto">Auto best</option>
          <option value="clean">Photo clean</option>
          <option value="visual">Photo detailed</option>
          <option value="chung">Structure lines</option>
          <option value="legacy">Legacy pixel fit</option>
        </select>
      </label>
      <label>Charset
        <select id="charset">
          <option value="set1">Uppercase / graphics</option>
          <option value="set2">Lowercase</option>
        </select>
      </label>
      <label>Reverse chars
        <input type="checkbox" id="useinv" checked style="width:auto;margin-top:6px">
      </label>
      <label>Palette
        <select id="pal">
          <option value="pepto">Pepto (classic)</option>
          <option value="colodore">Colodore</option>
          <option value="gray">Mono green</option>
        </select>
        <span class="swatches" id="swatches"></span>
      </label>
      <label>Dither
        <select id="dither">
          <option value="none">None</option>
          <option value="fs">Floyd–Steinberg</option>
        </select>
      </label>
      <label>Favor characters <span class="val" id="charbiasv">0</span>
        <input type="range" id="charbias" min="0" max="30" value="0" step="1">
      </label>
      <label>Auto match
        <input type="checkbox" id="automatch" checked style="width:auto;margin-top:6px">
      </label>
      <label>Phase align
        <input type="checkbox" id="phasealign" style="width:auto;margin-top:6px">
      </label>
      <label>Cell backgrounds
        <input type="checkbox" id="localbg" checked style="width:auto;margin-top:6px">
      </label>
      <label>Edge fidelity <span class="val" id="edgew">0</span>
        <input type="range" id="edgeweight" min="0" max="5" value="2" step="1">
      </label>
      <label>Shape match <span class="val" id="shapew">0</span>
        <input type="range" id="shapeweight" min="0" max="8" value="0" step="1">
      </label>
      <label>Orientation <span class="val" id="orientw">0</span>
        <input type="range" id="orientweight" min="0" max="40" value="0" step="2">
      </label>
    </div>

    <div class="stage">
      <div class="drop" id="drop">DROP AN IMAGE HERE OR LOAD FILE</div>
      <canvas id="out" width="320" height="200" style="display:none"></canvas>
      <div class="row">
        <button id="save" disabled>SAVE PNG</button>
        <button id="copytxt" disabled>COPY CODES</button>
        <button id="scale" disabled>×2 / ×4</button>
      </div>
      <div class="row">
        <button id="expprg" disabled>.PRG</button>
        <button id="expc" disabled>.C</button>
        <button id="expasm" disabled>.ASM</button>
        <button id="exppetmate" disabled>.PETMATE</button>
      </div>
      <div class="hint" id="status">no image loaded</div>
    </div>
  </div>
  <div style="text-align:center;margin-top:26px;padding-top:20px;border-top:2px solid var(--line)">
    <a href="explain.html" style="color:var(--c64-cyan);text-decoration:none;font-size:11px;letter-spacing:.16em;border:2px solid var(--c64-cyan);padding:7px 14px;display:inline-block;text-transform:uppercase">► How it works — step by step</a>
  </div>
  </div>

<script src="petscii-rom.js"></script>
<script src="petscii-core.js"></script>
<script>
const petsciiCore=PETSCIICore.create({upperRomBase64:PETSCII_ROM.UP_B64,lowerRomBase64:PETSCII_ROM.LOW_B64});
const PALETTES=petsciiCore.PALETTES;
const CW=petsciiCore.CW, CH=petsciiCore.CH;
let srcImg=null, scaleStep=1;
let charBias=0;
let edgeWeight=0;
let shapeWeight=0;
let orientWeight=0;
let autoMatch=true;
let processTimer=0, processTicket=0, busyTimer=0;
let workerSeq=0;
let petsciiWorker=null;
try{
  petsciiWorker=window.Worker?new Worker('petscii-worker.js'):null;
}catch(_){
  petsciiWorker=null;
}

function convertInWorker(image,options){
  if(!petsciiWorker) return Promise.resolve(petsciiCore.convertImageData(image,options));
  const id=++workerSeq;
  return new Promise((resolve,reject)=>{
    const onMessage=e=>{
      if(e.data.id!==id) return;
      petsciiWorker.removeEventListener('message',onMessage);
      petsciiWorker.removeEventListener('error',onError);
      if(e.data.error) reject(new Error(e.data.error));
      else resolve(e.data.result);
    };
    const onError=err=>{
      petsciiWorker.removeEventListener('message',onMessage);
      petsciiWorker.removeEventListener('error',onError);
      petsciiWorker=null;
      try{resolve(petsciiCore.convertImageData(image,options));}
      catch(fallbackErr){reject(fallbackErr);}
    };
    petsciiWorker.addEventListener('message',onMessage);
    petsciiWorker.addEventListener('error',onError);
    petsciiWorker.postMessage({id,image:{data:image.data,width:image.width,height:image.height},options});
  });
}

function process(){
  if(!srcImg) return;
  const ticket=++processTicket;
  clearTimeout(processTimer);
  setBusy(true,'CONVERTING',algorithmLabel()+' · matching cells',120);
  processTimer=setTimeout(()=>requestAnimationFrame(()=>{
    if(ticket!==processTicket) return;
    runProcess(ticket);
  }),60);
}

async function runProcess(ticket){
  if(!srcImg) return;
  try{
    const sW=srcImg.naturalWidth||srcImg.width, sH=srcImg.naturalHeight||srcImg.height;
    if(!sW || !sH){ status_.textContent='image not ready — try reloading'; return; }
    const cols=+cols_.value, rows=Math.max(1,Math.round(cols*9/16*(sH/sW)*16/9));
    const sourceW=sW;
    const sourceH=sH;
    const tmp=document.createElement('canvas');tmp.width=sourceW;tmp.height=sourceH;
    const tc=tmp.getContext('2d');
    tc.imageSmoothingEnabled=false;
    tc.drawImage(srcImg,0,0,sourceW,sourceH);
    const img=tc.getImageData(0,0,sourceW,sourceH);
    const result=await convertInWorker(img,{
      cols,rows,
      brightness:+bright_.value,
      contrast:+contrast_.value/100,
      mode:mode_.value,
      palette:pal_.value,
      dither:dither_.value,
      charBias,
      autoMatch,
      edgeWeight,
      shapeWeight,
      orientWeight,
      charset:charset_.value,
      useInverse:$('useinv').checked,
      algorithm:algo_.value,
      phaseMatch:$('phasealign').checked,
      localBackground:$('localbg').checked
    });
    if(ticket!==processTicket) return;
    const outCanvas=document.getElementById('out');
    outCanvas.width=result.width;outCanvas.height=result.height;
    outCanvas.getContext('2d').putImageData(new ImageData(result.data,result.width,result.height),0,0);
    textGrid=result.textGrid.slice();
    screenCodes=result.screenCodes.slice();
    colorRAM=result.colorRAM.slice();
    bgRAM=result.bgRAM?result.bgRAM.slice():[];
    globalBg=result.bg;
    exportMeta={cols:result.cols,rows:result.rows,bg:result.bg,border:result.border};
    scaleStep=1;applyScale();
    const cellPx=result.pixelsPerCellX&&result.pixelsPerCellY?` · source ${result.sourceWidth}×${result.sourceHeight} · ${result.pixelsPerCellX.toFixed(1)}×${result.pixelsPerCellY.toFixed(1)} px/cell`:'';
    const resolvedAlgo=algo_.value==='auto'&&result.algorithm?`auto ${result.algorithm}`:algorithmLabel();
    status_.textContent=`${result.cols}×${result.rows} cells · ${pal_.value} · ${mode_.value} · ${resolvedAlgo}${$('localbg').checked?' · cell bg':''}${cellPx}`;
    save_.disabled=copytxt_.disabled=scale_.disabled=false;
    const exportsEnabled=mode_.value!=='blocks'&&!$('localbg').checked;
    ['expprg','expc','expasm','exppetmate'].forEach(id=>$(id).disabled=!exportsEnabled);
  }catch(err){
    if(ticket===processTicket) status_.textContent='conversion failed';
    console.error(err);
  }finally{
    if(ticket===processTicket) setBusy(false);
  }
}

let textGrid=[], screenCodes=[], colorRAM=[], bgRAM=[], globalBg=6, exportMeta={cols:40,rows:25,bg:6,border:6};
function applyScale(){
  const out=document.getElementById('out');
  out.style.width=(out.width*scaleStep)+'px';
}

/* ---- wiring ---- */
const $=id=>document.getElementById(id);
const cols_=$('cols'),bright_=$('bright'),contrast_=$('contrast'),
      mode_=$('mode'),algo_=$('algo'),pal_=$('pal'),dither_=$('dither'),
      status_=$('status'),save_=$('save'),copytxt_=$('copytxt'),scale_=$('scale');
function algorithmLabel(){
  return algo_.options[algo_.selectedIndex].textContent.toLowerCase();
}
function setBusy(on,title='CONVERTING',text='matching PETSCII structure',delay=0){
  const busy=$('busy');
  clearTimeout(busyTimer);
  $('busytitle').textContent=title;
  $('busytext').textContent=text;
  if(on){
    const show=()=>busy.classList.add('show');
    if(delay>0) busyTimer=setTimeout(show,delay);
    else show();
  }else{
    busy.classList.remove('show');
  }
}

function swatches(){const el=$('swatches');el.innerHTML='';PALETTES[pal_.value].forEach(c=>{const s=document.createElement('span');s.className='sw';s.style.background=`rgb(${c[0]},${c[1]},${c[2]})`;el.appendChild(s);});}
swatches();

cols_.oninput=()=>{$('colsv').textContent=cols_.value;process();};
bright_.oninput=()=>{$('brv').textContent=bright_.value;process();};
contrast_.oninput=()=>{$('conv').textContent=(contrast_.value/100).toFixed(1);process();};
mode_.onchange=algo_.onchange=dither_.onchange=process;
pal_.onchange=()=>{swatches();process();};
const charbias_=$('charbias');
charbias_.oninput=()=>{charBias=+charbias_.value;$('charbiasv').textContent=charbias_.value;process();};
const edgeweight_=$('edgeweight');
edgeWeight=+edgeweight_.value;   // default 2
edgeweight_.oninput=()=>{edgeWeight=+edgeweight_.value;$('edgew').textContent=edgeweight_.value;process();};
$('edgew').textContent=edgeweight_.value;
const shapeweight_=$('shapeweight');
shapeweight_.oninput=()=>{shapeWeight=+shapeweight_.value;$('shapew').textContent=shapeweight_.value;process();};
const orientweight_=$('orientweight');
orientweight_.oninput=()=>{orientWeight=+orientweight_.value;$('orientw').textContent=orientweight_.value;process();};
const automatch_=$('automatch');
function syncAutoUI(){
  const on=automatch_.checked;
  [edgeweight_,shapeweight_,orientweight_].forEach(s=>{s.disabled=on;s.style.opacity=on?0.4:1;});
}
automatch_.onchange=()=>{autoMatch=automatch_.checked;syncAutoUI();process();};
syncAutoUI();
$('phasealign').onchange=process;
$('localbg').onchange=process;

function readAsDataURL(f){
  return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(f);});
}
function loadImage(url){
  // Resolve only when the image is actually decoded AND has dimensions.
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.onload=async ()=>{
      // some engines fire load before layout; decode() guarantees pixels are ready
      try{ if(img.decode) await img.decode(); }catch(_){}
      resolve(img);
    };
    img.onerror=()=>reject(new Error('image load failed'));
    img.src=url;                 // set AFTER handlers are attached
    // cached images may already be complete: trigger the path explicitly
    if(img.complete && img.naturalWidth) img.onload();
  });
}
async function loadFile(f){
  const isSvg = f && (f.type==='image/svg+xml' || /\.svg$/i.test(f.name||''));
  if(!f || (!f.type.startsWith('image/') && !isSvg)){status_.textContent='unsupported file';return;}
  status_.textContent='decoding…';
  setBusy(true,'LOADING','decoding source image');
  try{
    const url = await readAsDataURL(f);   // data URL avoids canvas-taint (esp. SVG)
    const img = await loadImage(url);
    let w=img.naturalWidth, h=img.naturalHeight;
    if(!w || !h){
      // SVG (and rare WebP) report 0 intrinsic size -> rasterize at a fixed canvas
      const vb = isSvg ? parseSvgSize(url) : null;
      w = (vb && vb.w) || 1024;
      h = (vb && vb.h) || 1024;
      const r=document.createElement('canvas');r.width=w;r.height=h;
      r.getContext('2d').drawImage(img,0,0,w,h);
      srcImg=r;
    } else {
      srcImg=img;
    }
    $('drop').style.display='none';$('out').style.display='block';
    process();
  }catch(err){
    setBusy(false);
    status_.textContent='could not decode this image';
    console.error(err);
  }
}
function parseSvgSize(dataUrl){
  try{
    const svg=decodeURIComponent(dataUrl.split(',')[1] ? atob(dataUrl.split(',')[1]) : '');
    const vb=svg.match(/viewBox\s*=\s*["']\s*[\d.+-]+\s+[\d.+-]+\s+([\d.+-]+)\s+([\d.+-]+)/i);
    if(vb) return {w:Math.round(+vb[1]), h:Math.round(+vb[2])};
    const wm=svg.match(/\bwidth\s*=\s*["']?\s*([\d.]+)/i), hm=svg.match(/\bheight\s*=\s*["']?\s*([\d.]+)/i);
    if(wm&&hm) return {w:Math.round(+wm[1]), h:Math.round(+hm[1])};
  }catch(_){}
  return null;
}
$('pick').onclick=()=>{ const fi=$('file'); fi.value=''; fi.click(); };
$('file').onchange=e=>{ const f=e.target.files[0]; if(f) loadFile(f); };
const drop=$('drop');
['dragover','dragenter'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('over');}));
['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove('over');}));
drop.addEventListener('drop',e=>loadFile(e.dataTransfer.files[0]));
document.body.addEventListener('paste',e=>{for(const it of e.clipboardData.files)loadFile(it);});

save_.onclick=()=>{
  const a=document.createElement('a');
  a.href=$('out').toDataURL('image/png'); a.download='petscii.png'; a.style.display='none';
  document.body.appendChild(a); a.click();
  setTimeout(()=>document.body.removeChild(a),2000);
};
copytxt_.onclick=()=>{
  // emit C64 screen codes (one per cell), hex, row-major — pokeable into screen RAM
  const cols=+cols_.value, lines=[];
  for(let i=0;i<screenCodes.length;i+=cols)
    lines.push(screenCodes.slice(i,i+cols).map(c=>c.toString(16).padStart(2,'0')).join(' '));
  navigator.clipboard.writeText(lines.join('\n'));
  status_.textContent='screen codes (hex) copied';
};
scale_.onclick=()=>{scaleStep=scaleStep>=4?1:scaleStep*2;applyScale();};
$('expprg').onclick=exportPrg;
$('expc').onclick=exportC;
$('expasm').onclick=exportAsm;
$('exppetmate').onclick=exportPetmate;

/* ---------- EXPORTERS ---------- */
function dl(name,data,mime){
  const blob = data instanceof Uint8Array
    ? new Blob([data],{type:mime||'application/octet-stream'})
    : new Blob([data],{type:mime||'text/plain'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=name;
  a.style.display='none';
  document.body.appendChild(a);   // must be in the DOM for click() to fire in all browsers
  a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},2000);
}
function haveScreen(){
  if(!screenCodes.length){status_.textContent='convert an image first';return false;}
  if(mode_.value==='blocks'){status_.textContent='switch to PETSCII mode to export codes';return false;}
  return true;
}
// pad live cols×rows art into a full 40×25 (1000) C64 screen at top-left
function padScreen(){
  const {cols,rows,bg}=exportMeta;
  const SCN=40,ROW=25;
  const scr=new Uint8Array(1000).fill(32);   // space
  const col=new Uint8Array(1000).fill(bg);   // fg=bg where empty (invisible)
  for(let y=0;y<Math.min(rows,ROW);y++)for(let x=0;x<Math.min(cols,SCN);x++){
    scr[y*SCN+x]=screenCodes[y*cols+x]&0xff;
    col[y*SCN+x]=colorRAM[y*cols+x]&0x0f;
  }
  return {scr,col};
}

/* .petmate — native Petmate workspace (version 2). Open via Petmate File > Open.
   Structure verified against Petmate/img2petscii source:
   { version:2, screens:[0], framebufs:[{ width,height,backgroundColor,borderColor,
     charset, name, framebuf: ScreenCell[height][width] of {code,color}, customFonts:{} }] } */
function exportPetmate(){
  if(!haveScreen())return;
  const {cols,rows,bg,border}=exportMeta;
  const charset = charset_.value==='set2' ? 'lower':'upper';
  const framebuf=[];
  for(let y=0;y<rows;y++){
    const row=[];
    for(let x=0;x<cols;x++){
      row.push({code:screenCodes[y*cols+x]&0xff, color:colorRAM[y*cols+x]&0x0f});
    }
    framebuf.push(row);
  }
  const obj={
    version:2,
    screens:[0],
    framebufs:[{
      width:cols,height:rows,
      backgroundColor:bg,borderColor:border,
      charset,name:'screen',
      framebuf,
      customFonts:{}
    }]
  };
  dl('petscii.petmate', JSON.stringify(obj), 'application/json');
  status_.textContent='exported .petmate (File > Open in Petmate)';
}

/* .c — C arrays, full 40x25 padded */
function exportC(){
  if(!haveScreen())return;
  const {scr,col}=padScreen(),{bg,border,cols,rows}=exportMeta;
  const fmt=(arr,per=20)=>{let s='';for(let i=0;i<arr.length;i++){s+=(i%per?'':'\n    ')+'0x'+arr[i].toString(16).padStart(2,'0')+(i<arr.length-1?',':'');}return s;};
  const c=`/* C64 PETSCII export — ${cols}x${rows} art on a 40x25 screen
   screen RAM -> $0400, color RAM -> $D800, border $D020, background $D021 */
#define PETSCII_BORDER ${border}
#define PETSCII_BACKGROUND ${bg}

const unsigned char petscii_screen[1000] = {${fmt(scr)}
};

const unsigned char petscii_color[1000] = {${fmt(col)}
};
`;
  dl('petscii.c', c, 'text/x-c');
  status_.textContent='exported .c (cc65 source — not a Petmate import)';
}

/* .asm — ACME / c64jasm-style source (assembles to a runnable .prg) */
function exportAsm(){
  if(!haveScreen())return;
  const {scr,col}=padScreen(),{bg,border}=exportMeta;
  const bytes=(arr)=>{let s='';for(let i=0;i<arr.length;i+=16){s+='        !byte '+Array.from(arr.slice(i,i+16),b=>'$'+b.toString(16).padStart(2,'0')).join(',')+'\n';}return s;};
  const asm=`; C64 PETSCII export — ACME syntax (acme -f cbm -o petscii.prg petscii.asm)
        !cpu 6510
        * = $0801
        ; BASIC: 10 SYS 2061
        !byte $0c,$08,$0a,$00,$9e,$32,$30,$36,$31,$00,$00,$00
start:
        lda #${border} : sta $d020
        lda #${bg}     : sta $d021
        ldx #0
copy:
        lda screen+$000,x : sta $0400,x
        lda screen+$100,x : sta $0500,x
        lda screen+$200,x : sta $0600,x
        lda screen+$300,x : sta $0700,x
        lda colram+$000,x : sta $d800,x
        lda colram+$100,x : sta $d900,x
        lda colram+$200,x : sta $da00,x
        lda colram+$300,x : sta $db00,x
        inx
        bne copy
        rts
screen:
${bytes(scr)}colram:
${bytes(col)}`;
  dl('petscii.asm', asm, 'text/plain');
  status_.textContent='exported .asm';
}

/* .prg — runnable Commodore 64 program (hand-assembled 6510) */
function exportPrg(){
  if(!haveScreen())return;
  const {scr,col}=padScreen(),{bg,border}=exportMeta;
  const LOAD=0x0801;
  const lo=n=>n&0xff, hi=n=>(n>>8)&0xff;
  // BASIC stub: 10 SYS 2061  ($080D)
  const basic=[0x0c,0x08, 0x0a,0x00, 0x9e,0x32,0x30,0x36,0x31, 0x00, 0x00,0x00];
  const mlStart=LOAD+basic.length;            // 0x080D
  // assemble ML twice (resolve data addresses)
  const asm=(scrAddr,colAddr)=>{
    const c=[];
    c.push(0xA9,border&0xff, 0x8D,0x20,0xD0); // lda #border : sta $d020
    c.push(0xA9,bg&0xff,     0x8D,0x21,0xD0); // lda #bg     : sta $d021
    c.push(0xA2,0x00);                        // ldx #0
    const loop=c.length;
    for(let p=0;p<4;p++) c.push(0xBD,lo(scrAddr+p*0x100),hi(scrAddr+p*0x100), 0x9D,lo(0x0400+p*0x100),hi(0x0400+p*0x100));
    for(let p=0;p<4;p++) c.push(0xBD,lo(colAddr+p*0x100),hi(colAddr+p*0x100), 0x9D,lo(0xD800+p*0x100),hi(0xD800+p*0x100));
    c.push(0xE8);                             // inx
    const rel=loop-(c.length+2);
    c.push(0xD0,rel&0xff);                    // bne copy
    c.push(0x60);                             // rts
    return c;
  };
  const mlLen=asm(0,0).length;
  const scrAddr=mlStart+mlLen, colAddr=scrAddr+1000;
  const ml=asm(scrAddr,colAddr);
  const prg=new Uint8Array(2+basic.length+ml.length+1000+1000);
  let o=0;
  prg[o++]=lo(LOAD);prg[o++]=hi(LOAD);
  basic.forEach(b=>prg[o++]=b);
  ml.forEach(b=>prg[o++]=b);
  scr.forEach(b=>prg[o++]=b);
  col.forEach(b=>prg[o++]=b);
  dl('petscii.prg', prg, 'application/octet-stream');
  status_.textContent='exported .prg (LOAD"*",8,1 : RUN)';
}

/* ---- draw the PETSCIInator title from real C64 ROM glyphs ---- */
(function drawTitle(){
  const text='PETSCIINATOR';
  const up=petsciiCore.getGlyphs('set1',true); // uppercase/graphics set
  const scrCode=ch=>{                         // map char -> C64 screen code
    if(ch>='A'&&ch<='Z') return ch.charCodeAt(0)-64;  // A=1..Z=26
    if(ch>='0'&&ch<='9') return ch.charCodeAt(0)-48+48;
    if(ch===' ') return 32;
    return 32;
  };
  const SCALE=6, GAP=1, CW=8, CH=8;
  const cvs=document.getElementById('titlebanner');
  const cols=text.length;
  cvs.width=cols*(CW+GAP)*SCALE - GAP*SCALE;
  cvs.height=CH*SCALE;
  const ctx=cvs.getContext('2d');
  ctx.imageSmoothingEnabled=false;
  ctx.clearRect(0,0,cvs.width,cvs.height);
  // light-blue glyphs on transparent (screen bg shows through), white drop highlight
  for(let n=0;n<cols;n++){
    const G=up[scrCode(text[n])];
    const ox=n*(CW+GAP)*SCALE;
    for(let p=0;p<64;p++) if(G[p]){
      const x=ox+(p&7)*SCALE, y=(p>>3)*SCALE;
      // subtle 1px dark drop-shadow for depth
      ctx.fillStyle='#2a1f6b';
      ctx.fillRect(x+2,y+2,SCALE,SCALE);
    }
  }
  for(let n=0;n<cols;n++){
    const G=up[scrCode(text[n])];
    const ox=n*(CW+GAP)*SCALE;
    for(let p=0;p<64;p++) if(G[p]){
      const x=ox+(p&7)*SCALE, y=(p>>3)*SCALE;
      ctx.fillStyle='#8d80d8';   // C64 light blue
      ctx.fillRect(x,y,SCALE,SCALE);
    }
  }
})();
